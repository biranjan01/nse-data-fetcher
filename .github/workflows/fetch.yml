name: NSE Data Fetch

on:
  workflow_dispatch:
  schedule:
    # Every 5 min during market hours (9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC)
    - cron: '*/5 3-10 * * 1-5'

permissions:
  contents: write

concurrency:
  group: nse-data-fetch
  cancel-in-progress: false

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-nse-v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nsefetch pandas pytz

      - name: Run nse.py
        run: python nse.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*
          git diff --staged --quiet || git commit -m "Update NSE data [skip ci]"
          git push
